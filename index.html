<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Authentication Portal</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>

    <div class="auth-wrapper">
        
        <div class="auth-card" id="loginCard">
            <h2>Login</h2>
            
            <form id="loginForm">
                <div class="input-group">
                    <input type="text" id="loginUsername" placeholder="Username" required>
                </div>
                
                <div class="input-group">
                    <input type="password" id="loginPassword" placeholder="Password" required>
                </div>
                
                <div class="options-row">
                    <label class="remember-me">
                        <input type="checkbox" id="remember">
                        <span>Remember me</span>
                    </label>
                    <a href="#" class="forgot-pass">Forgot password?</a>
                </div>
                
                <button type="submit" class="btn login-btn">Login</button>
            </form>
            
            <p class="footer-text">Don't have an account? <a href="#" id="toRegister" class="link-switch">Register</a></p>
        </div>


        <div class="auth-card hidden" id="signupCard">
            <div id="googleBtnContainer"></div>
            
            <div class="divider">or</div>
            
            <form id="signupForm">
                <div class="input-row">
                    <input type="text" id="firstName" placeholder="First Name" required>
                    <input type="text" id="lastName" placeholder="Last Name" required>
                </div>
                
                <div class="input-group password-wrapper">
                    <input type="password" id="registerPassword" placeholder="Password" required>
                    <span class="toggle-eye" data-target="registerPassword">👁️</span>
                </div>
                
                <div class="input-group password-wrapper">
                    <input type="password" id="confirmPassword" placeholder="Confirm Password" required>
                    <span class="toggle-eye" data-target="confirmPassword">👁️</span>
                </div>
                
                <button type="submit" class="btn create-btn">Create Account</button>
            </form>
            
            <p class="footer-text">Have an account? <a href="#" id="toLogin" class="link-switch spec-link">Log in here</a></p>
        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>
